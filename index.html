<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Świr - Portfolio</title>
    <!-- Normalize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- AOS Library CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <style>
        /* Definicja CSS Variables dla motywów */
        :root {
            --primary-color: #00BFFF; /* Niebieski */
            --hover-color: #1E90FF;
            --bg-color: #000;
            --text-color: #00BFFF;
            --btn-bg: #1E90FF;
            --btn-hover-bg: #00BFFF;
            --border-color: #00BFFF;
            --shadow-color: #00BFFF;
        }

        /* Motyw Zielony */
        .theme-green {
            --primary-color: #00FF00;
            --hover-color: #32CD32;
            --text-color: #00FF00;
            --btn-bg: #32CD32;
            --btn-hover-bg: #00FF00;
            --border-color: #00FF00;
            --shadow-color: #00FF00;
        }

        /* Motyw Niebieski */
        .theme-blue {
            --primary-color: #00BFFF;
            --hover-color: #1E90FF;
            --text-color: #00BFFF;
            --btn-bg: #1E90FF;
            --btn-hover-bg: #00BFFF;
            --border-color: #00BFFF;
            --shadow-color: #00BFFF;
        }

        /* Podstawowe ustawienia */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Efekt Glow dla Tekstów */
        h1, h2, h3, p, a {
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
        }

        /* Tło Matrix - Animacja */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2; /* Upewnienie się, że canvas nie blokuje interakcji */
            background: var(--bg-color);
        }

        /* Nawigacja */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            color: var(--primary-color);
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            transition: background 0.3s, color 0.3s;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 1200px;
            margin: auto;
            position: relative;
        }

        .logo {
            font-size: 1.5em;
            text-decoration: none;
            color: var(--primary-color);
            transition: color 0.3s;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            display: block;
            margin-top: 5px;
            right: 0;
            background: var(--hover-color);
            transition: width 0.3s ease;
            -webkit-transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
            left: 0;
            background: var(--hover-color);
        }

        /* Sekcje */
        section {
            padding: 100px 0;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .projects::before,
        .contact::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            position: relative;
        }

        /* Hero Sekcja */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 3em;
            margin-bottom: 20px;
            animation: neonGlow 2s infinite alternate;
        }

        .hero p {
            font-size: 1.2em;
            margin-bottom: 30px;
            animation: neonGlow 3s infinite alternate;
        }

        .btn {
            display: inline-block;
            padding: 10px 25px;
            background: var(--btn-bg);
            color: #000;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s ease, transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, var(--primary-color), var(--hover-color));
            border-radius: 30px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Przełącznik motywu */
        .theme-switcher {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
            transition: background 0.3s;
        }

        .theme-switcher:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        .theme-switcher i {
            color: var(--primary-color);
            font-size: 1.5em;
            transition: color 0.3s, text-shadow 0.3s;
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px var(--primary-color);
        }

        /* Projekty */
        .projects h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            color: var(--primary-color);
            transition: color 0.3s;
            animation: neonGlow 2.5s infinite alternate;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .project-grid::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 70%);
            animation: rotateBackground 20s linear infinite;
            z-index: -1;
        }

        .project-card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s, background 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card:hover {
            transform: translateY(-10px) rotateY(5deg);
            box-shadow: 0 0 20px var(--shadow-color);
            border-color: var(--hover-color);
            background: rgba(0, 0, 0, 0.85);
        }

        .project-card h3 {
            margin-bottom: 10px;
            font-size: 1.5em;
            animation: neonGlow 2s infinite alternate;
        }

        .repo-description {
            position: relative;
            overflow: hidden;
            max-height: 60px; /* Początkowa wysokość */
            transition: max-height 0.3s ease;
            margin-bottom: 10px;
            flex-grow: 1;
        }

        .repo-description .more-text {
            display: none;
        }

        .project-card.active .repo-description {
            max-height: 500px; /* Maksymalna wysokość po rozwinięciu */
        }

        .project-card.active .repo-description .more-text {
            display: inline;
        }

        .read-more-btn {
            background: none;
            border: none;
            color: var(--hover-color);
            cursor: pointer;
            padding: 0;
            font-size: 1em;
            margin-top: 10px;
            transition: color 0.3s ease, transform 0.3s ease;
            align-self: flex-start;
        }

        .read-more-btn:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        /* Kontakt */
        .contact h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            color: var(--primary-color);
            transition: color 0.3s;
            animation: neonGlow 2.5s infinite alternate;
        }

        .contact form {
            max-width: 600px;
            margin: auto;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .contact input, 
        .contact textarea {
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--primary-color);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.5);
            color: var(--primary-color);
            font-size: 1em;
            transition: border-color 0.3s, background 0.3s, color 0.3s;
        }

        .contact input::placeholder, 
        .contact textarea::placeholder {
            color: var(--primary-color);
            opacity: 0.7;
        }

        .contact input:focus, 
        .contact textarea:focus {
            border-color: var(--hover-color);
            background: rgba(0, 0, 0, 0.7);
        }

        .contact button {
            align-self: center;
            padding: 10px 30px;
            background: var(--btn-bg);
            color: #000;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .contact button::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, var(--primary-color), var(--hover-color));
            border-radius: 30px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .contact button:hover::before {
            opacity: 1;
        }

        .contact button:hover {
            transform: scale(1.05);
        }

        .social-links {
            text-align: center;
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        .social-links a {
            color: var(--primary-color);
            margin: 0 10px;
            font-size: 1.5em;
            transition: transform 0.3s, color 0.3s;
            position: relative;
        }

        .social-links a::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            display: block;
            margin-top: 5px;
            right: 0;
            background: var(--hover-color);
            transition: width 0.3s ease;
        }

        .social-links a:hover::after {
            width: 100%;
            left: 0;
            background: var(--hover-color);
        }

        .social-links a:hover {
            transform: scale(1.2);
            color: var(--hover-color);
        }

        /* Stopka */
        footer {
            background: rgba(0, 0, 0, 0.8);
            color: var(--primary-color);
            text-align: center;
            padding: 20px 0;
            transition: color 0.3s;
            animation: neonGlow 2s infinite alternate;
        }

        /* Animacje */
        @keyframes neonGlow {
            from {
                text-shadow: 0 0 5px var(--primary-color), 0 0 10px var(--primary-color);
            }
            to {
                text-shadow: 0 0 20px var(--hover-color), 0 0 30px var(--hover-color);
            }
        }

        @keyframes rotateBackground {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsywność */
        @media (max-width: 768px) {
            .nav-links {
                flex-direction: column;
                position: absolute;
                top: 60px;
                right: 0;
                background: rgba(0, 0, 0, 0.9);
                width: 100%;
                display: none;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                margin: 15px 0;
                text-align: center;
            }

            .hamburger {
                display: flex;
                flex-direction: column;
                cursor: pointer;
            }

            .hamburger div {
                width: 25px;
                height: 3px;
                background: var(--primary-color);
                margin: 4px 0;
                transition: all 0.3s ease;
            }

            .hamburger.toggle div:nth-child(1) {
                transform: rotate(-45deg) translate(-5px, 6px);
            }

            .hamburger.toggle div:nth-child(2) {
                opacity: 0;
            }

            .hamburger.toggle div:nth-child(3) {
                transform: rotate(45deg) translate(-5px, -6px);
            }
        }

        @media (max-width: 600px) {
            .project-card {
                padding: 15px;
            }

            .project-card h3 {
                font-size: 1.2em;
            }

            .project-card p {
                font-size: 0.9em;
            }

            .btn {
                padding: 8px 20px;
            }

            .theme-switcher {
                bottom: 15px;
                right: 15px;
            }
        }

        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Dodatkowe Efekty Sci-Fi */
        /* Pulsujący efekt na przyciskach */
        .btn, .contact button {
            box-shadow: 0 0 20px var(--primary-color);
            animation: pulseButton 2s infinite alternate;
        }

        @keyframes pulseButton {
            0% {
                box-shadow: 0 0 20px var(--primary-color);
            }
            50% {
                box-shadow: 0 0 40px var(--hover-color);
            }
            100% {
                box-shadow: 0 0 20px var(--primary-color);
            }
        }

        /* Animacja pulsującego nagłówka */
        h2, h3 {
            animation: neonGlow 2.5s infinite alternate;
        }
    </style>
</head>

    <script>
        // Hamburger Menu Toggle
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            hamburger.classList.toggle('toggle');
        });

        // Przełącznik Motywu
        const themeSwitcher = document.getElementById('theme-switcher');
        const body = document.body;

        // Funkcja do przełączania motywów
        function toggleTheme() {
            if (body.classList.contains('theme-green')) {
                body.classList.remove('theme-green');
                body.classList.add('theme-blue');
                localStorage.setItem('theme', 'theme-blue');
            } else {
                body.classList.remove('theme-blue');
                body.classList.add('theme-green');
                localStorage.setItem('theme', 'theme-green');
            }
            updateMatrixColor();
        }

        // Dodanie nasłuchiwacza na przycisk przełącznika
        themeSwitcher.addEventListener('click', toggleTheme);

        // Sprawdzenie preferencji użytkownika przy załadowaniu strony
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                body.classList.remove('theme-green', 'theme-blue');
                body.classList.add(savedTheme);
            } else {
                body.classList.add('theme-green'); // Domyślny motyw zielony
            }
            updateMatrixColor();
        });

        // Animacja Matrix
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        // Funkcja do pobierania wartości zmiennych CSS
        function getCSSVariable(variable) {
            return getComputedStyle(document.documentElement).getPropertyValue(variable).trim();
        }

        // Ustawienia canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            drops = [];
            for(let x = 0; x < columns; x++) {
                drops[x] = 1;
            }
        }

        const fontSize = 16; // Zdefiniuj fontSize przed użyciem
        let columns = Math.floor(window.innerWidth / fontSize);
        let drops = [];

        // Inicjalizacja kropel
        for(let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        // Funkcja rysująca Matrixa
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const textColor = getCSSVariable('--text-color');
            ctx.fillStyle = textColor;
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                drops[i]++;
            }
        }

        const chars = 'アァカサタナハマヤャラガザダバパイィキシチニヒミリギジヂビピウゥクスツヌフムユュルグズヅブプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロゴゾドボポヴン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        const matrixInterval = setInterval(drawMatrix, 33);

        // Responsywność
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Funkcja do aktualizacji koloru Matrixa po zmianie motywu
        function updateMatrixColor() {
            // Resetowanie canvasu, aby natychmiast zobaczyć zmianę koloru
            ctx.fillStyle = 'rgba(0, 0, 0, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Pobieranie i wyświetlanie repozytoriów GitHub
        const repoList = document.getElementById('repo-list');

        async function fetchRepos() {
            const username = 'Swir'; // Zmień na swój login GitHub
            let repos = [];
            let page = 1;
            const per_page = 100;
            let hasMore = true;

            try {
                while (hasMore) {
                    const response = await fetch(`https://api.github.com/users/${username}/repos?per_page=${per_page}&page=${page}`);
                    if (!response.ok) {
                        throw new Error(`Błąd podczas pobierania repozytoriów: ${response.status} ${response.statusText}`);
                    }
                    const data = await response.json();

                    if (data.length > 0) {
                        repos = repos.concat(data);
                        page++;
                    } else {
                        hasMore = false;
                    }
                }

                // Filtracja repozytoriów - wykluczenie forków
                repos = repos.filter(repo => !repo.fork);

                // Sortowanie repozytoriów według daty ostatniej aktualizacji
                repos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

                // Sprawdzenie, czy są jakieś repozytoria do wyświetlenia
                if (repos.length === 0) {
                    const noRepoMsg = document.createElement('p');
                    noRepoMsg.textContent = 'Nie znaleziono żadnych repozytoriów.';
                    noRepoMsg.style.color = 'var(--primary-color)';
                    repoList.appendChild(noRepoMsg);
                    return;
                }

                // Tworzenie kart dla każdego repozytorium
                repos.forEach(repo => {
                    const repoCard = document.createElement('div');
                    repoCard.classList.add('project-card');

                    const repoName = document.createElement('h3');
                    repoName.textContent = repo.name;

                    const repoDesc = document.createElement('p');
                    repoDesc.classList.add('repo-description');

                    const description = repo.description ? repo.description.trim() : 'Brak opisu.';
                    const shortDesc = description.length > 100 ? description.substring(0, 100) + '...' : description;
                    const moreText = description.length > 100 ? description.substring(100) : '';

                    repoDesc.innerHTML = `
                        ${shortDesc}
                        ${moreText ? `<span class="more-text">${moreText}</span>` : ''}
                    `;

                    const repoLanguage = document.createElement('p');
                    repoLanguage.textContent = `🛠️ Język: ${repo.language || 'N/A'}`;
                    repoLanguage.style.color = 'var(--primary-color)';
                    repoLanguage.style.marginBottom = '10px';

                    const repoStars = document.createElement('p');
                    repoStars.textContent = `⭐ ${repo.stargazers_count}`;
                    repoStars.style.color = 'var(--primary-color)';
                    repoStars.style.marginBottom = '10px';

                    const repoLink = document.createElement('a');
                    repoLink.href = repo.html_url;
                    repoLink.target = '_blank';
                    repoLink.rel = 'noopener noreferrer';
                    repoLink.textContent = 'Zobacz na GitHubie';
                    repoLink.style.display = 'block';
                    repoLink.style.marginBottom = '10px';
                    repoLink.style.color = 'var(--primary-color)';
                    repoLink.style.transition = 'color 0.3s ease';
                    repoLink.addEventListener('mouseover', () => {
                        repoLink.style.color = 'var(--hover-color)';
                    });
                    repoLink.addEventListener('mouseout', () => {
                        repoLink.style.color = 'var(--primary-color)';
                    });

                    const readMoreBtn = document.createElement('button');
                    readMoreBtn.classList.add('read-more-btn');
                    readMoreBtn.textContent = moreText ? 'Czytaj więcej' : '';
                    readMoreBtn.style.display = moreText ? 'inline-block' : 'none';

                    repoCard.appendChild(repoName);
                    repoCard.appendChild(repoDesc);
                    repoCard.appendChild(repoLanguage);
                    repoCard.appendChild(repoStars);
                    repoCard.appendChild(repoLink);
                    if (moreText) {
                        repoCard.appendChild(readMoreBtn);
                    }

                    repoList.appendChild(repoCard);
                });

                // Dodanie funkcji do obsługi "Czytaj więcej"
                const readMoreButtons = document.querySelectorAll('.read-more-btn');

                readMoreButtons.forEach(button => {
                    button.addEventListener('click', () => {
                        const projectCard = button.closest('.project-card');
                        projectCard.classList.toggle('active');
                        button.textContent = projectCard.classList.contains('active') ? 'Czytaj mniej' : 'Czytaj więcej';
                    });
                });

            } catch (error) {
                console.error(error);
                const errorMsg = document.createElement('p');
                errorMsg.textContent = 'Wystąpił błąd podczas ładowania repozytoriów.';
                errorMsg.style.color = 'var(--primary-color)';
                repoList.appendChild(errorMsg);
            }
        }

        fetchRepos();
    </script>
</body>
</html>
